<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="thanks.html">
        <label>
            user name:
            <input type="text" required name="name" id="name" placeholder="enter your name">
        </label>
        <label>
            password:
            <input type="password" required name="pass">
        </label>
        <label>
            destinations:
            <select required name="dest">
                <option value="" disabled selected>-- choose one --</option>
                <option value="ישראל">ישראל</option>
                <option value="יוון">יוון</option>
                <option value="קפריסין">קפריסין</option>
            </select>
        </label>
        <label>
            days:
            <input type="number" required name="days" min="3" max="30">
        </label>
        <label>
            <input type="checkbox" name="remember">
            remember me: 
        </label>
        <label>
            gender:
            <input type="radio" value="m" name="gender">male
            <input type="radio" vlaue="f" name="gender">female
            <input type="radio" value="o" name="gender">Other
        </label>
        <label>
            email:
            <input type="email" required name="email">
        </label>
        <label>
            about:
            <textarea required name="about"></textarea>
        </label>
        <button type="submit">Send</button>
        <button type="reset">Clear</button>
        <!-- <input type="submit" value="send"> -->
        <!-- <input type="color" name="" id="">
        <input type="date" name="" id="">
        <input type="range" name="" id="">
        <input type="file"> -->
    </form>
</body>
</html>
